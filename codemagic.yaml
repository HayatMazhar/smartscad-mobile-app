workflows:
  ios-uat:
    name: iOS UAT (Ad Hoc)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 22.14.0
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://uatmobileapi.adsmartsupport.ae/SmartSCADMobileAPI/api/v1"
        EXPO_PUBLIC_PROFILE_IMAGE_BASE: "https://www.adsmartsupport.ae"
        BUNDLE_ID: "ae.adsmartsupport.smartscadmobile"

    scripts:
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/adhoc.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/adhoc.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install Node dependencies
        script: npm install

      - name: Expo prebuild (generate ios/ folder)
        script: |
          npx expo prebuild --platform ios --clean --no-install
          echo "=== Podfile first 10 lines ==="
          head -10 ios/Podfile
          echo "=== node_modules/react-native-mmkv exists? ==="
          ls node_modules/react-native-mmkv/react-native-mmkv.podspec 2>/dev/null && echo "YES" || echo "NO - mmkv podspec missing!"

      - name: Install CocoaPods
        script: |
          # Run pod install from project root so relative paths resolve correctly
          # pod install reads ios/Podfile which references ../node_modules/*
          # Those paths resolve to <project_root>/node_modules/* which is correct
          pod install --project-directory=ios --repo-update
          echo "Exit code: $?"
          echo "=== iOS folder after pod install ==="
          ls -la ios/
          if [ ! -d "ios/Sanadkom.xcworkspace" ]; then
            echo "ERROR: Sanadkom.xcworkspace not created — pod install likely failed above"
            exit 1
          fi
          echo "SUCCESS: ios/Sanadkom.xcworkspace exists"

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Sanadkom.xcworkspace \
            --scheme Sanadkom \
            --config Release \
            --disable-xcpretty \
            --log-stream stdout

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - apps@scad.ae
        notify:
          success: true
          failure: true

  ios-appstore:
    name: iOS App Store (Production)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 22.14.0
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://mobileapi.adsmartsupport.ae/SmartSCADMobileAPI/api/v1"
        EXPO_PUBLIC_PROFILE_IMAGE_BASE: "https://www.adsmartsupport.ae"
        BUNDLE_ID: "ae.adsmartsupport.smartscadmobile"

    scripts:
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE_APPSTORE | base64 --decode > /tmp/appstore.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install Node dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        script: |
          pod install --project-directory=ios --repo-update
          if [ ! -d "ios/Sanadkom.xcworkspace" ]; then exit 1; fi

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Sanadkom.xcworkspace \
            --scheme Sanadkom \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - apps@scad.ae
        notify:
          success: true
          failure: true

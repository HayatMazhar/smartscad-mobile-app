workflows:
  ios-uat:
    name: iOS UAT (Ad Hoc)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 22.14.0
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://uatmobileapi.adsmartsupport.ae/SmartSCADMobileAPI/api/v1"
        EXPO_PUBLIC_PROFILE_IMAGE_BASE: "https://www.adsmartsupport.ae"
        BUNDLE_ID: "ae.adsmartsupport.smartscadmobile"

    scripts:
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/adhoc.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/adhoc.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install Node dependencies
        script: npm install

      - name: Expo prebuild (generate ios/ folder)
        script: |
          npx expo prebuild --platform ios --clean --no-install
          echo "=== Patching Podfile via Ruby script ==="
          ruby scripts/patch-podfile-deployment-target.rb

      - name: Install CocoaPods
        script: |
          pod install --project-directory=ios --repo-update
          ls -la ios/
          if [ ! -d "ios/Sanadkom.xcworkspace" ]; then
            echo "ERROR: Sanadkom.xcworkspace not created"
            exit 1
          fi
          echo "SUCCESS: ios/Sanadkom.xcworkspace exists"

      - name: Patch Pods.xcodeproj (force iOS 15.1 on all pod targets)
        script: |
          ruby scripts/patch-pods-xcodeproj.rb

      - name: Build iOS IPA
        script: |
          set -e
          echo $CM_PROVISIONING_PROFILE_APPSTORE | base64 --decode > /tmp/appstore.mobileprovision
          cp /tmp/appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>87KPX56NJY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ae.adsmartsupport.smartscadmobile</key>
              <string>*[expo] ae.adsmartsupport.smartscadmobile AdHoc 1777892514262</string>
            </dict>
          </dict>
          </plist>
          EOF

          mkdir -p /tmp/xcodebuild_logs
          set +e
          xcodebuild \
            -workspace ios/Sanadkom.xcworkspace \
            -scheme Sanadkom \
            -config Release \
            -archivePath /tmp/Sanadkom.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=87KPX56NJY \
            PROVISIONING_PROFILE_SPECIFIER="*[expo] ae.adsmartsupport.smartscadmobile AppStore 2026-05-04T08:15:18.093Z" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            IPHONEOS_DEPLOYMENT_TARGET=15.1 \
            SWIFT_VERSION=5.0 \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            archive 2>&1 | tee /tmp/xcodebuild_logs/archive.log
          ARCHIVE_EXIT=${PIPESTATUS[0]}
          set -e

          if [ ! -d "/tmp/Sanadkom.xcarchive" ]; then
            echo ""
            echo "==================== ARCHIVE FAILED (exit=$ARCHIVE_EXIT) ===================="
            echo "==================== REAL Swift/clang errors (file:line:col format) ===================="
            grep -E "^[^:]+\.(swift|m|mm|h|cpp|cc):[0-9]+:[0-9]+:.*error:" /tmp/xcodebuild_logs/archive.log | head -30 || echo "No file-line errors found"
            echo ""
            echo "==================== Other 'error generated' / 'fatal' lines ===================="
            grep -E "(error generated|fatal error|FAILED:|❌|unknown attribute|Cannot find)" /tmp/xcodebuild_logs/archive.log | grep -v "error:(NSError" | head -30 || echo "No matches"
            echo ""
            echo "==================== Last 100 lines of archive log ===================="
            tail -100 /tmp/xcodebuild_logs/archive.log
            exit 1
          fi

          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Sanadkom.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/Sanadkom.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - apps@scad.ae
        notify:
          success: true
          failure: true

  ios-appstore:
    name: iOS App Store (Production)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 22.14.0
      vars:
        EXPO_PUBLIC_API_BASE_URL: "https://mobileapi.adsmartsupport.ae/SmartSCADMobileAPI/api/v1"
        EXPO_PUBLIC_PROFILE_IMAGE_BASE: "https://www.adsmartsupport.ae"
        BUNDLE_ID: "ae.adsmartsupport.smartscadmobile"

    scripts:
      - name: Set up code signing
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE_APPSTORE | base64 --decode > /tmp/appstore.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/appstore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install Node dependencies
        script: npm install

      - name: Expo prebuild (generate ios/ folder)
        script: |
          npx expo prebuild --platform ios --clean --no-install
          ruby scripts/patch-podfile-deployment-target.rb

      - name: Install CocoaPods
        script: |
          pod install --project-directory=ios --repo-update
          if [ ! -d "ios/Sanadkom.xcworkspace" ]; then exit 1; fi

      - name: Patch Pods.xcodeproj (force iOS 15.1 on all pod targets)
        script: |
          ruby scripts/patch-pods-xcodeproj.rb

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/Sanadkom.xcworkspace \
            --scheme Sanadkom \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - apps@scad.ae
        notify:
          success: true
          failure: true
